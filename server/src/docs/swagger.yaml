openapi: 3.0.0
info:
  title: SmartSeason API
  version: 1.0.0
  description: REST API for crop field monitoring. Tracks fields, assigns agents, captures updates and computes field health status automatically.

servers:
  - url: http://localhost:5000
    description: Local server
  - url: https://smartseason-7ukd.onrender.com
    description: Production server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: James Admin
        email:
          type: string
          example: admin@smartseason.com
        role:
          type: string
          enum: [admin, agent]
          example: admin
    Field:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: North Block A
        crop_type:
          type: string
          example: Maize
        planting_date:
          type: string
          format: date
          example: "2026-03-01"
        current_stage:
          type: string
          enum: [planted, growing, ready, harvested]
          example: growing
        status:
          type: string
          enum: [active, at_risk, completed]
          example: at_risk
        assigned_agent_id:
          type: integer
          example: 2
        agent_name:
          type: string
          example: Grace Wanjiru
    FieldUpdate:
      type: object
      properties:
        id:
          type: integer
          example: 1
        field_id:
          type: integer
          example: 1
        agent_id:
          type: integer
          example: 2
        stage:
          type: string
          enum: [planted, growing, ready, harvested]
          example: growing
        notes:
          type: string
          example: Good canopy cover, no signs of stress
        risk_flags:
          type: array
          items:
            type: string
          example: ["pest_infestation"]
        created_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Access denied

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: James Admin
                email:
                  type: string
                  example: admin@smartseason.com
                password:
                  type: string
                  example: Admin1234
                role:
                  type: string
                  enum: [admin, agent]
                  example: admin
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: "#/components/schemas/User"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      summary: Login and receive a JWT token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: admin@smartseason.com
                password:
                  type: string
                  example: Admin1234
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: "#/components/schemas/User"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fields:
    post:
      summary: Create a new field (admin only)
      tags: [Fields]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: North Block A
                crop_type:
                  type: string
                  example: Maize
                planting_date:
                  type: string
                  format: date
                  example: "2026-03-01"
                assigned_agent_id:
                  type: integer
                  example: 2
      responses:
        "201":
          description: Field created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Field"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: Get all fields (role scoped)
      tags: [Fields]
      responses:
        "200":
          description: List of fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Field"

  /fields/{id}:
    get:
      summary: Get a single field with its full update history
      tags: [Fields]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Field with updates
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Field"
                      - type: object
                        properties:
                          updates:
                            type: array
                            items:
                              $ref: "#/components/schemas/FieldUpdate"
        "404":
          description: Field not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a field (admin only)
      tags: [Fields]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Field deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Field deleted
        "404":
          description: Field not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /fields/{id}/assign:
    patch:
      summary: Assign or reassign a field to an agent (admin only)
      tags: [Fields]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id]
              properties:
                agent_id:
                  type: integer
                  example: 3
      responses:
        "200":
          description: Field assigned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Field"
        "400":
          description: Target user is not an agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Field not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /updates:
    post:
      summary: Submit a field update (assigned agent only)
      tags: [Updates]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [field_id, stage]
              properties:
                field_id:
                  type: integer
                  example: 1
                stage:
                  type: string
                  enum: [planted, growing, ready, harvested]
                  example: growing
                notes:
                  type: string
                  example: Good canopy cover, no signs of stress
                risk_flags:
                  type: array
                  items:
                    type: string
                    enum: [pest_infestation, disease_outbreak, drought_stress, waterlogging, nutrient_deficiency]
                  example: ["pest_infestation"]
      responses:
        "201":
          description: Update submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/FieldUpdate"
        "403":
          description: Not assigned to this field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Field not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /updates/field/{field_id}:
    get:
      summary: Get all updates for a field
      tags: [Updates]
      parameters:
        - in: path
          name: field_id
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: List of updates for the field
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/FieldUpdate"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Field not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard:
    get:
      summary: Get role scoped dashboard summary
      tags: [Dashboard]
      responses:
        "200":
          description: Dashboard data for admin or agent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object